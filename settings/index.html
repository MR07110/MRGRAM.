<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More · MR GRAM</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="more-container page-content" id="more-page">
        <section class="profile-section glass">
            <div class="avatar" style="width: 80px; height: 80px; font-size: 30px;">MR</div>
            <div class="profile-info">
                <h2>MR Developer</h2>
                <p>Junior Developer | Uzbekistan</p>
            </div>
        </section>

        <div class="status-grid">
            <div class="status-card glass">
                <span class="blue-text">RAM</span>
                <p id="ram-usage">Optimized</p>
            </div>
            <div class="status-card glass">
                <span class="blue-text">Status</span>
                <p>Online</p>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-item glass" onclick="location.href='../projects/index.html'">
                <div class="menu-icon">🚀</div>
                <span>My Projects (MRgram, MRAI)</span>
            </div>
            <div class="menu-item glass">
                <div class="menu-icon">📊</div>
                <span>Startup Plan (88.7M Sum)</span>
            </div>
            <div class="menu-item glass" onclick="clearAppCache()">
                <div class="menu-icon">🧹</div>
                <span>Clear Cache & Optimize</span>
            </div>
            <div class="menu-item glass" style="color: #ff3b30;">
                <div class="menu-icon">🚪</div>
                <span>Log Out</span>
            </div>
        </div>
    </main>

    <script src="../components/header.js"></script>
    <script src="../components/bottom-nav.js"></script>
    <script src="script.js"></script>
</body>
</html>
