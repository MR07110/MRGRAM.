<!-- html/onboarding.html -->
<!-- Onboarding / Ro'yxatdan o'tish -->

<div id="onboardingPage" class="onboarding-page" style="display: none;">
    
    <!-- Theme Toggle -->
    <div class="onboarding-theme-toggle" id="themeToggle">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </div>
    
    <div class="onboarding-container">
        <div class="onboarding-slides">
            
            <!-- STEP 1: Welcome -->
            <div class="onboarding-slide active" data-step="1">
                <div class="slide-content">
                    <div class="onboarding-logo">
                        <svg viewBox="0 0 24 24" width="80" height="80" fill="none">
                            <circle cx="12" cy="12" r="12" fill="#24A1DE"/>
                            <path d="M5 16C5 16 7.5 6 10.5 11.5C13.5 17 16 6 19 16" 
                                  stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h1 class="onboarding-title">MR GRAM</h1>
                    <p class="onboarding-description">Zamonaviy, xavfsiz va tezkor messenjer</p>
                    <button class="onboarding-btn" data-next="2">Boshlash</button>
                </div>
            </div>
            
            <!-- STEP 2: Name & Username -->
            <div class="onboarding-slide" data-step="2">
                <div class="slide-content">
                    <h2 class="onboarding-step-title">Ismingiz nima?</h2>
                    <p class="onboarding-step-desc">Do'stlaringiz sizni shu ism bilan topadi</p>
                    <div class="onboarding-input-wrapper">
                        <input type="text" id="onboardingName" class="onboarding-input" placeholder="Ismingiz" autocomplete="name">
                    </div>
                    <div class="onboarding-input-wrapper">
                        <input type="text" id="onboardingUsername" class="onboarding-input" placeholder="Username" autocomplete="username">
                    </div>
                    <button class="onboarding-btn" data-next="3">Davom etish</button>
                    <button class="onboarding-skip" data-next="3">O'tkazib yuborish</button>
                </div>
            </div>
            
            <!-- STEP 3: Avatar -->
            <div class="onboarding-slide" data-step="3">
                <div class="slide-content">
                    <h2 class="onboarding-step-title">Profil rasmi</h2>
                    <p class="onboarding-step-desc">O'zingizga yoqqan rasmni tanlang</p>
                    <div class="onboarding-avatar-wrapper">
                        <div class="onboarding-avatar" onclick="document.getElementById('onboardingAvatarInput').click()">
                            <img id="onboardingAvatarPreview" src="" alt="Avatar" style="display: none;">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                    </div>
                    <input type="file" id="onboardingAvatarInput" accept="image/*" style="display: none;">
                    <button class="onboarding-btn" data-next="4">Davom etish</button>
                    <button class="onboarding-skip" data-next="4">O'tkazib yuborish</button>
                </div>
            </div>
            
            <!-- STEP 4: Password -->
            <div class="onboarding-slide" data-step="4">
                <div class="slide-content">
                    <h2 class="onboarding-step-title">Parol o'rnating</h2>
                    <p class="onboarding-step-desc">Hisobingizni himoya qilish uchun</p>
                    <div class="onboarding-input-wrapper">
                        <input type="password" id="onboardingPassword" class="onboarding-input" placeholder="Parol" autocomplete="new-password">
                    </div>
                    <div class="onboarding-input-wrapper">
                        <input type="password" id="onboardingConfirmPassword" class="onboarding-input" placeholder="Parolni tasdiqlang">
                    </div>
                    <button class="onboarding-btn" data-next="5">Ro'yxatdan o'tish</button>
                </div>
            </div>
            
            <!-- STEP 5: Success -->
            <div class="onboarding-slide" data-step="5">
                <div class="slide-content">
                    <div class="onboarding-success-icon">
                        <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="#4caf50" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 12l3 3 6-6"/>
                        </svg>
                    </div>
                    <h2 class="onboarding-title">Tayyor!</h2>
                    <p class="onboarding-description">Muvaffaqiyatli ro'yxatdan o'tdingiz</p>
                    <button class="onboarding-btn" id="finishOnboarding">Chatni boshlash</button>
                </div>
            </div>
            
        </div>
        
        <div class="onboarding-progress">
            <span class="progress-dot active" data-step="1"></span>
            <span class="progress-dot" data-step="2"></span>
            <span class="progress-dot" data-step="3"></span>
            <span class="progress-dot" data-step="4"></span>
            <span class="progress-dot" data-step="5"></span>
        </div>
    </div>
</div>
