<!-- html/chat.html -->
<!-- Chat sahifasi interfeysi -->

<div id="chatView" class="chat-view">
    <!-- Chat Header -->
    <div class="chat-header">
        <button id="closeChatBtn" class="chat-back-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        
        <div class="chat-title">
            <img id="chatAvatarImg" class="chat-avatar" src="" alt="Avatar" style="display: none;">
            <span id="chatTitle">Chat</span>
        </div>
        
        <div class="chat-actions">
            <button id="audioCallBtn" class="call-header-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
            </button>
            
            <button id="videoCallBtn" class="call-header-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="2" y="6" width="15" height="12" rx="2"/>
                    <path d="M22 8l-5 4 5 4V8z"/>
                </svg>
            </button>
            
            <button id="groupInfoBtn" class="call-header-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Pinned Message Bar -->
    <div id="pinnedMessageBar" class="pinned-message-bar" style="display: none;">
        <div class="pinned-message-content">
            <span class="pinned-message-icon">📌</span>
            <span class="pinned-message-text"></span>
            <button id="unpinBtn" class="pinned-message-close">✕</button>
        </div>
    </div>
    
    <!-- Reply Indicator -->
    <div id="replyIndicator" class="reply-indicator" style="display: none;">
        <div class="reply-indicator-content">
            <span class="reply-indicator-text"></span>
            <button id="cancelReplyBtn" class="reply-indicator-cancel">✕</button>
        </div>
    </div>
    
    <!-- Messages Container -->
    <div id="chatMsgs" class="chat-messages"></div>
    
    <!-- Input Bar -->
    <div class="input-bar">
        <button id="fileUploadBtn" class="file-upload-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>
        
        <div class="msg-field">
            <input type="text" id="msgInput" placeholder="Xabar yozing..." autocomplete="off">
        </div>
        
        <div class="right-buttons">
            <button id="voiceBtn" class="voice-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            
            <button id="sendBtn" class="send-btn-circle" style="display: none;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Recording Status -->
    <div id="recordingStatus" class="recording-status-panel">
        <div class="recording-waveform" id="recordingWaveform"></div>
        <div class="recording-timer" id="recordingTimer">0:00</div>
        <div id="slideHint" class="slide-hint">⬅️ Bekor qilish</div>
    </div>
</div>
