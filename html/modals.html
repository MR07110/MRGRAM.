<!-- html/modals.html -->
<!-- Barcha modal oynalar -->

<!-- Modal Root -->
<div id="modal-root"></div>

<!-- Add Contact Modal -->
<div id="addContactModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">➕ Kontakt qo'shish</h3>
            <button class="modal-close" onclick="document.getElementById('addContactModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <input type="text" id="searchUsername" class="modal-input" placeholder="Username">
            <div id="searchResult" class="search-result" style="display: none;"></div>
        </div>
        <div class="modal-footer">
            <button id="closeModalBtn" class="btn btn-secondary">Yopish</button>
        </div>
    </div>
</div>

<!-- Create Group Modal -->
<div id="createGroupModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">👥 Guruh yaratish</h3>
            <button class="modal-close" onclick="document.getElementById('createGroupModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <input type="text" id="groupName" class="modal-input" placeholder="Guruh nomi">
            <input type="text" id="groupDescription" class="modal-input" placeholder="Tavsif (ixtiyoriy)">
        </div>
        <div class="modal-footer">
            <button id="confirmCreateGroupBtn" class="btn btn-primary">Yaratish</button>
            <button id="cancelCreateGroupBtn" class="btn btn-secondary">Bekor qilish</button>
        </div>
    </div>
</div>

<!-- Create Channel Modal -->
<div id="createChannelModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">📢 Kanal yaratish</h3>
            <button class="modal-close" onclick="document.getElementById('createChannelModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <input type="text" id="channelName" class="modal-input" placeholder="Kanal nomi">
            <input type="text" id="channelDescription" class="modal-input" placeholder="Tavsif (ixtiyoriy)">
        </div>
        <div class="modal-footer">
            <button id="confirmCreateChannelBtn" class="btn btn-primary">Yaratish</button>
            <button id="cancelCreateChannelBtn" class="btn btn-secondary">Bekor qilish</button>
        </div>
    </div>
</div>

<!-- Group Info Modal -->
<div id="groupInfoModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">👥 Guruh ma'lumotlari</h3>
            <button class="modal-close" onclick="document.getElementById('groupInfoModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <div class="group-info-header">
                <div class="group-info-avatar">👥</div>
                <div class="group-info-name" id="groupInfoName"></div>
                <div class="group-info-desc" id="groupInfoDesc"></div>
            </div>
            <div class="group-info-stats">
                <div>👥 <span id="groupInfoMembers">0</span> a'zo</div>
                <div>📝 <span id="groupInfoMessages">0</span> xabar</div>
            </div>
        </div>
        <div class="modal-footer">
            <button id="groupInfoCloseBtn" class="btn btn-secondary">Yopish</button>
        </div>
    </div>
</div>

<!-- Forward Modal -->
<div id="forwardModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">↗️ Forward qilish</h3>
            <button class="modal-close" onclick="document.getElementById('forwardModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <input type="text" id="forwardSearchInput" class="modal-input" placeholder="Chat nomi yoki username">
            <div id="forwardResults" class="forward-results"></div>
        </div>
        <div class="modal-footer">
            <button id="cancelForwardBtn" class="btn btn-secondary">Bekor qilish</button>
        </div>
    </div>
</div>

<!-- Save Message Modal -->
<div id="saveModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">💾 Xabarni saqlash</h3>
            <button class="modal-close" onclick="document.getElementById('saveModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <p style="text-align: center;">Xabar saqlandimi?</p>
        </div>
        <div class="modal-footer">
            <button id="confirmSaveBtn" class="btn btn-primary">Saqlash</button>
            <button id="cancelSaveBtn" class="btn btn-secondary">Bekor qilish</button>
        </div>
    </div>
</div>

<!-- Vault PIN Modal -->
<div id="vaultModal" class="modal vault-modal">
    <div class="modal-card vault-modal-card">
        <div class="modal-header">
            <h3 class="modal-title">🔐 PIN-kod kiriting</h3>
            <button class="modal-close" onclick="document.getElementById('vaultModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <p class="vault-modal-desc">Maxfiy kontaktlarni ko'rish uchun PIN-kod kiriting</p>
            <div class="vault-pin-inputs">
                <input type="password" id="vaultPinInput" class="vault-pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••">
            </div>
            <div id="vaultErrorMsg" class="vault-error-msg" style="display: none;">❌ PIN-kod xato!</div>
        </div>
        <div class="modal-footer">
            <button id="vaultConfirmBtn" class="btn btn-primary">Tasdiqlash</button>
            <button id="vaultCancelBtn" class="btn btn-secondary">Bekor qilish</button>
        </div>
    </div>
</div>

<!-- Vault Change PIN Modal -->
<div id="vaultChangePinModal" class="modal vault-modal">
    <div class="modal-card vault-modal-card">
        <div class="modal-header">
            <h3 class="modal-title">🔐 PIN-kod o'zgartirish</h3>
            <button class="modal-close" onclick="document.getElementById('vaultChangePinModal').classList.remove('active')">✕</button>
        </div>
        <div class="modal-body">
            <input type="password" id="oldPinInput" class="vault-pin-input" maxlength="4" placeholder="Eski PIN" inputmode="numeric">
            <input type="password" id="newPinInput" class="vault-pin-input" maxlength="4" placeholder="Yangi PIN" inputmode="numeric" style="margin-top: 12px;">
            <input type="password" id="confirmPinInput" class="vault-pin-input" maxlength="4" placeholder="Yangi PIN tasdiqlash" inputmode="numeric" style="margin-top: 12px;">
            <div id="vaultPinError" class="vault-error-msg" style="display: none;"></div>
        </div>
        <div class="modal-footer">
            <button id="vaultPinConfirmBtn" class="btn btn-primary">O'zgartirish</button>
            <button id="vaultPinCancelBtn" class="btn btn-secondary">Bekor qilish</button>
        </div>
    </div>
</div>

<!-- Media Preview Panels -->
<div id="imagePreviewPanel" class="image-preview" style="display: none;">
    <img id="previewImg" src="" alt="Preview">
    <div class="preview-info">
        <div id="previewFileName" class="preview-name"></div>
        <div class="preview-progress-bar">
            <div class="preview-progress-fill" style="width: 0%;"></div>
        </div>
    </div>
    <button id="cancelImagePreview" class="cancel-preview">Bekor qilish</button>
</div>

<div id="videoPreviewPanel" class="video-preview" style="display: none;">
    <video id="videoPreview" controls></video>
    <div class="preview-info">
        <div id="videoFileName" class="preview-name"></div>
    </div>
    <button id="cancelVideoPreview" class="cancel-preview">Bekor qilish</button>
</div>

<div id="voicePreviewPanel" class="voice-preview" style="display: none;">
    <audio id="voicePreviewAudio" controls></audio>
    <div class="preview-info">
        <div id="audioFileName" class="preview-name"></div>
    </div>
    <button id="cancelVoicePreview" class="cancel-preview">Bekor qilish</button>
</div>

<div id="filePreviewPanel" class="file-preview" style="display: none;">
    <div class="file-preview-icon">📎</div>
    <div class="preview-info">
        <div id="fileName" class="preview-name"></div>
        <div id="fileSize" class="preview-size"></div>
    </div>
    <button id="cancelFilePreview" class="cancel-preview">Bekor qilish</button>
</div>
