<!-- html/auth.html -->
<!-- Autentifikatsiya sahifasi - Login va Register -->

<div id="authPage" class="auth-page">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="url(#authGrad)" stroke-width="1.5">
                <defs>
                    <linearGradient id="authGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00d2ff"/>
                        <stop offset="100%" style="stop-color:#9d00ff"/>
                    </linearGradient>
                </defs>
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
        </div>
        
        <!-- Title -->
        <h1 class="auth-title">MR GRAM</h1>
        <p class="auth-subtitle">Premium Edition · Neon Cyberpunk</p>
        
        <!-- Avatar Upload (Register mode) -->
        <div id="authAvatarSection" class="auth-avatar-section">
            <div class="auth-avatar">
                <div class="avatar-upload" onclick="document.getElementById('authAvatarInput').click()">
                    <img id="authAvatarPreview" class="avatar-preview-img" src="" alt="Avatar" style="display: none;">
                    <svg id="avatarPlaceholder" class="avatar-placeholder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
            </div>
            <input type="file" id="authAvatarInput" accept="image/*" style="display: none;">
        </div>
        
        <!-- Register Name (Register mode) -->
        <div id="regBox" class="reg-box">
            <div class="auth-input-group">
                <input type="text" id="regName" class="auth-input" placeholder="Ismingiz" autocomplete="name">
            </div>
        </div>
        
        <!-- Username -->
        <div class="auth-input-group">
            <input type="text" id="regUser" class="auth-input" placeholder="Username" autocomplete="username">
        </div>
        
        <!-- Password -->
        <div class="auth-input-group">
            <input type="password" id="regPass" class="auth-input" placeholder="Parol" autocomplete="current-password">
        </div>
        
        <!-- Confirm Password (Register mode) -->
        <div id="confirmPassBox" class="confirm-pass-box">
            <div class="auth-input-group">
                <input type="password" id="regConfirmPass" class="auth-input" placeholder="Parolni tasdiqlang">
            </div>
        </div>
        
        <!-- Action Button -->
        <button id="authBtn" class="auth-btn">KIRISH</button>
        
        <!-- Switch Login/Register -->
        <p class="auth-switch">
            <span>Hisobingiz yo'qmi?</span>
            <span id="switchBtn" class="switch-btn">Ro'yxatdan o'tish</span>
        </p>
        
        <!-- Demo Hint -->
        <p class="auth-demo">
            Made with MR
        </p>
    </div>
</div>
