<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRgram · Kirish</title>
    <link rel="icon" type="image/svg+xml" href="../mrgram.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <!-- Theme Overlay -->
    <div id="theme-overlay"></div>
    
    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeBtn">
        <svg viewBox="0 0 24 24">
            <mask id="moon-mask">
                <rect x="0" y="0" width="24" height="24" fill="white" />
                <circle class="moon-mask" cx="12" cy="12" r="8" fill="black" />
            </mask>
            <circle cx="12" cy="12" r="8" mask="url(#moon-mask)" />
        </svg>
    </div>

    <!-- Login Card -->
    <div class="login-card">
        <!-- Logo -->
        <div class="logo-container">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="12" fill="#24A1DE"/>
                <path d="M5 16C5 16 7.5 6 10.5 11.5C13.5 17 16 6 19 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <!-- Title -->
        <div class="text-wrapper">
            <h1 id="title-login" class="state-text visible-center">Kirish</h1>
            <h1 id="title-signup" class="state-text hidden-up">Ro'yxatdan o'tish</h1>
        </div>
        
        <!-- Subtitle -->
        <div class="subtitle-wrapper">
            <p id="sub-login" class="state-text visible-center">Xush kelibsiz! Ma'lumotlarni kiriting.</p>
            <p id="sub-signup" class="state-text hidden-up">Yangi hisob ochish uchun ro'yxatdan o'ting.</p>
        </div>
        
        <!-- Form -->
        <div class="form-container">
            <!-- Ism (faqat register da) -->
            <div class="input-group" id="name-group">
                <label class="input-label">Ismingiz</label>
                <input type="text" class="custom-input" id="fullName" placeholder="Ismingizni kiriting" autocomplete="name">
            </div>
            
            <!-- Username -->
            <div class="input-group">
                <label class="input-label">Username</label>
                <input type="text" class="custom-input" id="username" placeholder="@username" autocomplete="username" autocapitalize="none">
            </div>
            
            <!-- Parol -->
            <div class="input-group">
                <label class="input-label">Parol</label>
                <input type="password" class="custom-input" id="password" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="password-toggle" id="togglePassword" aria-label="Parolni ko'rsatish">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                        <line x1="2" y1="22" x2="22" y2="2" class="eye-slash" stroke="currentColor" stroke-width="2" opacity="0"/>
                    </svg>
                </button>
            </div>
            
            <!-- Tasdiqlash paroli (faqat register da) -->
            <div class="input-group" id="confirm-group">
                <label class="input-label">Parolni tasdiqlang</label>
                <input type="password" class="custom-input" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
            </div>
            
            <!-- Submit Button -->
            <button class="btn-main" id="submit-btn">
                <span id="btn-text">KIRISH</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </div>
        
        <!-- Toggle Link -->
        <div class="toggle-container">
            <div id="footer-login" class="state-text visible-center">
                Hisobingiz yo'qmi? <span class="toggle-link" id="toggleFormLink">Ro'yxatdan o'tish</span>
            </div>
            <div id="footer-signup" class="state-text hidden-down">
                Hisobingiz bormi? <span class="toggle-link" id="toggleFormLink2">Kirish</span>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="error-toast" id="errorToast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
