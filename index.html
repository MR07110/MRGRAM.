<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRgram · Telegram Clone</title>
    <link rel="icon" type="image/svg+xml" href="mrgram.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0e0e0e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }
        
        .loader {
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(36, 161, 222, 0.2);
            border-top-color: #24A1DE;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader p {
            color: #aaaaaa;
            font-size: 14px;
        }
        
        .error {
            color: #e74c3c;
            margin-top: 16px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="loader">
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="#24A1DE"/>
            <path d="M5 16C5 16 7.5 6 10.5 11.5C13.5 17 16 6 19 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="spinner"></div>
        <p id="status">MRgram yuklanmoqda...</p>
        <div class="error" id="error"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        
        const SUPABASE_URL = "https://mujoriozaxjojrgkkars.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11am9yaW96YXhqb2pyZ2trYXJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjQ1MjQsImV4cCI6MjA5MDU0MDUyNH0.IiCWIT5QU06Wd7fEgRtTkG4IoC5oxyTgRAuWxRf15Zw";
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        
        async function checkAndRedirect() {
            try {
                // Avval localStorage dan tekshirish (tezroq)
                const localSession = localStorage.getItem('mrgram_session');
                
                if (localSession) {
                    statusEl.textContent = 'Sessiya topildi, yo\'naltirilmoqda...';
                    
                    // Supabase orqali sessionni tekshirish
                    const { data: { session }, error } = await supabase.auth.getSession();
                    
                    if (session) {
                        // Session valid, home ga o'tish
                        window.location.href = 'home/';
                    } else {
                        // Session eskirgan, login ga o'tish
                        localStorage.removeItem('mrgram_session');
                        localStorage.removeItem('mrgram_user');
                        window.location.href = 'login/';
                    }
                } else {
                    // Session yo'q, login ga o'tish
                    statusEl.textContent = 'Kirish sahifasiga yo\'naltirilmoqda...';
                    setTimeout(() => {
                        window.location.href = 'login/';
                    }, 500);
                }
                
            } catch (error) {
                console.error('Auth tekshirish xatosi:', error);
                statusEl.style.display = 'none';
                document.querySelector('.spinner').style.display = 'none';
                errorEl.textContent = 'Xatolik yuz berdi. Qayta urinib ko\'ring.';
                errorEl.classList.add('show');
                
                // 3 sekunddan keyin login ga o'tish
                setTimeout(() => {
                    window.location.href = 'login/';
                }, 3000);
            }
        }
        
        // Sahifa yuklanganda tekshirish
        checkAndRedirect();
        
        // Agar internet sekin bo'lsa, 5 sekunddan keyin avtomatik login ga
        setTimeout(() => {
            const currentPath = window.location.pathname;
            if (currentPath === '/' || currentPath.endsWith('index.html')) {
                window.location.href = 'login/';
            }
        }, 5000);
    </script>
</body>
</html>
