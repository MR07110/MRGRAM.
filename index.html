<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR GRAM · Premium</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300d2ff' stroke-width='1.5'%3E%3Cpath d='M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z'/%3E%3C/svg%3E">
    
    <style>
        /* Splash screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #0b0d11;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        
        .splash-logo {
            width: 100px;
            height: 100px;
            background: #0b0d11;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.5);
            animation: splashPulse 1.5s infinite ease-in-out;
        }
        
        .splash-logo svg {
            width: 60px;
            height: 60px;
        }
        
        @keyframes splashPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="url(#splashGrad)" stroke-width="1.5">
                <defs>
                    <linearGradient id="splashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00d2ff"/>
                        <stop offset="100%" style="stop-color:#9d00ff"/>
                    </linearGradient>
                </defs>
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
        </div>
    </div>
    
    <!-- App Root -->
    <div id="appRoot" class="app-container"></div>
    
    <!-- Hidden Elements -->
    <div style="display: none;">
        <span id="meName"></span>
        <span id="meUser"></span>
        <input id="newName">
        <input id="profileAvatarInput" type="file" accept="image/*">
        <img id="profileAvatarImg">
        <div id="sidebarAvatarContainer"><img id="sidebarAvatarImg"></div>
    </div>
    
    <!-- Eruda Debug (faqat development uchun) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <!-- Main JS -->
    <script type="module" src="assets/js/core/main-boss.js"></script>
    <script type="module">
        import mainBoss from './assets/js/core/main-boss.js';
        
        window.mainBoss = mainBoss;
        
        // Splash ni yashirish
        setTimeout(() => {
            const splash = document.getElementById('splash');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
        }, 2000);
        
        // App ni ishga tushirish
        console.log('🚀 MRGRAM ishga tushmoqda...');
        mainBoss.start().then(() => {
            console.log('✅ MRGRAM tayyor!');
        });
    </script>
</body>
</html>
