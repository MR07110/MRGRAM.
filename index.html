<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR GRAM · Premium</title>
    <link rel="icon" type="image/svg+xml" href="mrgram.svg">
    <link rel="stylesheet" href="style.css">
    <style>.loader{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}</style>
</head>
<body>
    <div class="loader"><div class="spinner"></div></div>
    <script>
        (function() {
            const u = localStorage.getItem('mrgram_user');
            const d = localStorage.getItem('onboarding_completed');
            if (u && d === 'true') window.location.href = './home/';
            else window.location.href = './onboard/';
        })();
    </script>
</body>
</html>
