<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRgram</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/mrgram.svg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .splash-container {
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .splash-logo {
            width: 140px;
            height: 140px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 6px 16px rgba(36, 161, 222, 0.15));
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        
        .splash-text {
            color: #24A1DE;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            opacity: 0;
            animation: slideUp 0.4s ease-out 0.2s forwards;
        }
        
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .splash-subtitle {
            color: #999;
            font-size: 14px;
            margin-top: 8px;
            opacity: 0;
            animation: slideUp 0.4s ease-out 0.4s forwards;
        }
        
        /* Progress bar - pastda */
        .progress-container {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            opacity: 0.4;
        }
        
        .progress-bar {
            width: 100%;
            height: 3px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #24A1DE;
            border-radius: 3px;
            animation: progress 2.2s ease-in-out forwards;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        /* Status text */
        .status-text {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            color: #bbb;
            font-size: 12px;
            opacity: 0;
            animation: fadeIn 0.3s ease-out 1.5s forwards;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="/mrgram.svg" alt="MRgram" class="splash-logo" id="splashLogo">
        <div class="splash-text">MRgram</div>
        <div class="splash-subtitle">Tez · Xavfsiz · Bepul</div>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>
    
    <div class="status-text" id="statusText">Yuklanmoqda...</div>

    <script>
        (function() {
            console.log('🚀 MRgram Splash - 2 sekund');
            
            const statusEl = document.getElementById('statusText');
            let redirectTimer = null;
            
            // Minimal kutish vaqti - 2 sekund
            const MIN_SPLASH_TIME = 2000;
            const startTime = Date.now();
            
            // Yo'naltirish funksiyasi
            function redirectTo(target) {
                if (statusEl) statusEl.textContent = 'Yo\'naltirilmoqda...';
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.3s ease';
                
                setTimeout(() => {
                    window.location.href = target;
                }, 300);
            }
            
            // Session tekshirish va yo'naltirish
            async function checkSessionAndRedirect() {
                try {
                    // LocalStorage dan tekshirish
                    const localUser = localStorage.getItem('mrgram_user');
                    const localSession = localStorage.getItem('mrgram_session');
                    
                    if (localUser || localSession) {
                        // Session bor - home ga
                        console.log('✅ Session topildi → Home');
                        redirectTo('/home/');
                    } else {
                        // Session yo'q - login ga
                        console.log('❌ Session yo\'q → Login');
                        redirectTo('/login/');
                    }
                    
                } catch (error) {
                    console.error('Session tekshirish xatosi:', error);
                    redirectTo('/login/');
                }
            }
            
            // 2 sekund kutish va yo'naltirish
            function startRedirectTimer() {
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, MIN_SPLASH_TIME - elapsed);
                
                if (statusEl) {
                    statusEl.textContent = 'Tayyorlanmoqda...';
                }
                
                redirectTimer = setTimeout(() => {
                    checkSessionAndRedirect();
                }, remaining);
            }
            
            // Logo yuklanishini kutish
            const logo = document.getElementById('splashLogo');
            
            if (logo.complete) {
                startRedirectTimer();
            } else {
                logo.onload = startRedirectTimer;
                logo.onerror = startRedirectTimer;
            }
            
            // Maksimal kutish vaqti (5 sekund)
            setTimeout(() => {
                if (redirectTimer) {
                    clearTimeout(redirectTimer);
                }
                console.log('⏰ Maksimal vaqt tugadi');
                const localUser = localStorage.getItem('mrgram_user');
                redirectTo(localUser ? '/home/' : '/login/');
            }, 5000);
            
            // Agar foydalanuvchi bossa, tezlashtirish (ixtiyoriy)
            let clickCount = 0;
            document.body.addEventListener('click', () => {
                clickCount++;
                if (clickCount >= 3) {
                    if (redirectTimer) clearTimeout(redirectTimer);
                    checkSessionAndRedirect();
                }
            });
            
        })();
    </script>
</body>
</html>
