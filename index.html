<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRgram</title>
    <link rel="icon" type="image/svg+xml" href="/mrgram.svg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .splash-logo {
            width: 120px;
            height: 120px;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(36, 161, 222, 0.15));
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <img src="/mrgram.svg" alt="MRgram" class="splash-logo" id="splashLogo">

    <script type="module">
        (function() {
            console.log('🚀 MRgram Splash');
            
            const MIN_SPLASH_TIME = 1750; // 2 sekund
            const startTime = Date.now();
            
            // ========== SESSION TEKSHIRISH ==========
            async function checkSession() {
                try {
                    // LocalStorage dan tekshirish
                    const localUser = localStorage.getItem('mrgram_user');
                    
                    // Firebase Auth tekshirish
                    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                    const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
                    
                    const firebaseConfig = {
                        apiKey: "AIzaSyBhzWWFFgrOH84J2RIW5o7l_8192iPtbOg",
                        authDomain: "code-vibe-df610.firebaseapp.com",
                        projectId: "code-vibe-df610",
                        storageBucket: "code-vibe-df610.firebasestorage.app",
                        messagingSenderId: "747762490655",
                        appId: "1:747762490655:web:125516814620784cf3a42a"
                    };
                    
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    
                    return new Promise((resolve) => {
                        const unsubscribe = onAuthStateChanged(auth, (user) => {
                            unsubscribe();
                            
                            if (user) {
                                localStorage.setItem('mrgram_user', JSON.stringify({
                                    uid: user.uid,
                                    displayName: user.displayName,
                                    email: user.email
                                }));
                                resolve('home');
                            } else {
                                localStorage.removeItem('mrgram_user');
                                resolve('login');
                            }
                        });
                    });
                    
                } catch (error) {
                    console.error('Session xatosi:', error);
                    const localUser = localStorage.getItem('mrgram_user');
                    return localUser ? 'home' : 'login';
                }
            }
            
            // ========== YO'NALTIRISH ==========
            async function redirect() {
                const target = await checkSession();
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, MIN_SPLASH_TIME - elapsed);
                
                setTimeout(() => {
                    console.log(`📍 Yo'naltirilmoqda: /${target}/`);
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.2s ease';
                    
                    setTimeout(() => {
                        window.location.href = target === 'home' ? '/home/' : '/login/';
                    }, 200);
                    
                }, remaining);
            }
            
            // Logo yuklanishini kutish
            const logo = document.getElementById('splashLogo');
            if (logo.complete) {
                redirect();
            } else {
                logo.onload = redirect;
                logo.onerror = redirect;
            }
            
            // Maksimal 4 sekund
            setTimeout(() => {
                const localUser = localStorage.getItem('mrgram_user');
                window.location.href = localUser ? '/home/' : '/login/';
            }, 4000);
            
        })();
    </script>
</body>
</html>
</html>
