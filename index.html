<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR GRAM · Premium</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='12' fill='%2324A1DE'/%3E%3Cpath d='M5 16C5 16 7.5 6 10.5 11.5C13.5 17 16 6 19 16' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121212; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #loader { display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-size: 18px; }
    </style>
</head>
<body>
    <div id="loader">⏳ Yuklanmoqda...</div>
    
    <script>
        (function() {
            const savedUser = localStorage.getItem('mrgram_user');
            const onboardingDone = localStorage.getItem('onboarding_completed');
            
            // Universal base path aniqlash
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const basePath = isLocalhost ? '' : '';
            
            // Qayerga yo'naltirish
            let targetPage;
            
            if (!savedUser || onboardingDone !== 'true') {
                targetPage = basePath + '/html/onboard.html';
            } else {
                targetPage = basePath + '/html/chat.html';
            }
            
            // Agar localhost bo'lsa va fayl topilmasa, muqobil yo'l
            if (isLocalhost) {
                // Localhostda html/ papkasini tekshirish
                fetch(targetPage, { method: 'HEAD' })
                    .then(res => {
                        if (!res.ok) {
                            // Agar html/onboard.html topilmasa, root dagi onboard.html ga
                            if (targetPage.includes('/html/onboard.html')) {
                                window.location.href = '/onboard.html';
                            } else {
                                window.location.href = '/chat.html';
                            }
                        } else {
                            window.location.href = targetPage;
                        }
                    })
                    .catch(() => {
                        // Xatolik bo'lsa, root ga yo'naltirish
                        if (!savedUser || onboardingDone !== 'true') {
                            window.location.href = '/onboard.html';
                        } else {
                            window.location.href = '/chat.html';
                        }
                    });
            } else {
                // Vercel/GitHub Pages uchun to'g'ridan-to'g'ri yo'naltirish
                window.location.href = targetPage;
            }
        })();
    </script>
</body>
</html>
