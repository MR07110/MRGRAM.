cd ~/MRGRAM

# index.html fayliga SW kodini qo'shish
cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR GRAM · Premium</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='12' fill='%2324A1DE'/%3E%3Cpath d='M5 16C5 16 7.5 6 10.5 11.5C13.5 17 16 6 19 16' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <style>
        body { background: #121212; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div>⏳ Yo'naltirilmoqda...</div>
    
    <!-- ========== SERVICE WORKER ========== -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('✅ SW ro\'yxatdan o\'tdi:', registration.scope);
                    
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        console.log('🔄 Yangi SW topildi');
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                if (confirm('Yangi versiya mavjud. Yangilansinmi?')) {
                                    window.location.reload();
                                }
                            }
                        });
                    });
                })
                .catch(error => {
                    console.error('❌ SW ro\'yxatdan o\'tmadi:', error);
                });
        }
    </script>
    
    <!-- ========== ROUTER ========== -->
    <script>
        (function() {
            const savedUser = localStorage.getItem('mrgram_user');
            const onboardingDone = localStorage.getItem('onboarding_completed');
            
            if (!savedUser || onboardingDone !== 'true') {
                window.location.href = './onboard/';
            } else {
                window.location.href = './home/';
            }
        })();
    </script>
</body>
</html>
EOF

echo "✅ index.html yangilandi!"
