<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MRgram</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='12' fill='%238774e1'/%3E%3Cpath d='M5 16L10 8L14 14L19 6' stroke='white' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; background: #0f0f0f; }
        .router-loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .loader { width: 40px; height: 40px; border: 2px solid #242424; border-top-color: #8774e1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="router-loader"><div class="loader"></div></div>
    <script>
        (function() {
            const u = localStorage.getItem('mrgram_user');
            const d = localStorage.getItem('onboarding_completed');
            if (u && d === 'true') window.location.href = './home/';
            else window.location.href = './onboard/';
        })();
    </script>
</body>
</html>
