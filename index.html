<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR GRAM · Premium</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='12' fill='%2334b7f1'/%3E%3Cpath d='M5 16C5 16 7.5 6 10.5 11.5C13.5 17 16 6 19 16' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <style>
        .router-loader {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="router-loader">
        <div class="loader-spinner"></div>
    </div>
    
    <script>
        (function() {
            const user = localStorage.getItem('mrgram_user');
            const done = localStorage.getItem('onboarding_completed');
            
            if (user && done === 'true') {
                window.location.href = './home/';
            } else {
                window.location.href = './onboard/';
            }
        })();
    </script>
</body>
</html>
