<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRGRAM_404</title>
    <style>
        :root {
            --primary-blue: #0088cc;
            --hover-blue: #0077b5;
            --text-dark: #445566;
            --text-muted: #7f919d;
            --bg-gradient: linear-gradient(135deg, #f5faff 0%, #e8f4ff 100%);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            color: var(--text-dark);
        }

        .error-wrapper {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .svg-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 1rem;
            animation: containerJump 4s steps(1) infinite;
        }

        @keyframes containerJump {
            0%, 92%, 100% { transform: translate(0,0); }
            93% { transform: translate(-3px, 2px); }
            95% { transform: translate(3px, -2px); }
        }

        .title { 
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 850; 
            color: var(--primary-blue);
            margin: 0.5rem 0;
        }

        .subtitle { 
            font-size: 1.1rem; 
            color: var(--text-muted);
            margin-bottom: 2rem;
            min-height: 3em;
        }

        .timer-box {
            background: rgba(0, 136, 204, 0.08);
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1rem;
            color: var(--primary-blue);
            font-weight: 600;
            border: 1px solid rgba(0, 136, 204, 0.1);
        }

        .btn-back {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background-color: var(--primary-blue);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.2);
        }

        .btn-back:hover {
            background-color: var(--hover-blue);
            transform: translateY(-3px);
        }

        strong { color: #005580; }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <div class="svg-container">
            <img src="404.svg" alt="404 Error" style="width: 100%;">
        </div>
        
        <h1 class="title">MANZIL TOPILMADI</h1>
        <p class="subtitle" id="status-msg">Siz qidirgan manzil xatoga o'xshaydi.</p>

        <div class="timer-box" id="timer-display">
            10 soniyadan so'ng "MRGRAM"ga qaytasiz...
        </div>

        <a href="https://mrgram.vercel.app" class="btn-back">MRGRAM</a>
    </div>

    <script>
        // SMART REDIRECT DATABASE
    const dictionary = {
        'chats': [
            'chat', 'cahts', 'chast', 'cvaht', 'chaat', 'shats', 'chays', 'chatz', 'vhats', 'chatsy', 
            'chatss', 'xats', 'shat', 'chast', 'chata', 'chtes', 'chast', 'chats1', 'chays', 'cjats', 
            'chsts', 'cgats', 'vhats', 'xhats', 'chatsq', 'chatsw', 'chatsde', 'chatss', 'chatt', 'chwt', 
            'chatx', 'chatc', 'cyats', 'chatsu', 'chatsi', 'chatso', 'chast', 'chatzz', 'chattz', 'chataz', 
            'chatsss', 'chatsm', 'chatsn', 'chastb', 'chataas', 'chatsss', 'chssts', 'vhats', 'c-h-a-t-s', 'chats0'
        ],
        
        'channels': [
            'channel', 'chanel', 'shannels', 'channrls', 'channals', 'channrll', 'vannels', 'chanels', 'chaneel', 'cannels', 
            'kanallar', 'kanal', 'cannell', 'channl', 'channle', 'channal', 'chennels', 'chenel', 'chenal', 'shannel', 
            'shannil', 'channles', 'chanells', 'channele', 'channell', 'channlss', 'channels1', 'channrl', 'xhannels', 'vhannels', 
            'channlse', 'chaneels', 'chanenl', 'chanelll', 'channells', 'cannal', 'cannalss', 'channlels', 'chanelsz', 'chanelsq', 
            'channals', 'chanelsw', 'chaneel', 'channale', 'channle', 'cannl', 'channels0', 'channls', 'channle', 'channells'
        ],
        
        'groups': [
            'group', 'grups', 'groops', 'grops', 'grouos', 'grouls', 'grrups', 'hroups', 'froups', 'groupp', 
            'gurux', 'guruh', 'grupa', 'gruppa', 'groop', 'grooups', 'groupps', 'grouo', 'grrops', 'grruops', 
            'vroups', 'troups', 'grous', 'grousp', 'groupss', 'groupps', 'grouop', 'gropus', 'gropu', 'groupe', 
            'grouppa', 'gruup', 'gruups', 'gropps', 'groppu', 'grpups', 'grrupps', 'groyps', 'grpups', 'gropus', 
            'grouups', 'grouls', 'grous', 'grouppz', 'groups1', 'groups0', 'grops', 'groupps', 'grups', 'grrps'
        ],
        
        'settings': [
            'setting', 'setings', 'sttings', 'seting', 'settins', 'settngs', 'drttings', 'aetings', 'settig', 'setingz', 
            'sozlamalar', 'nastroyka', 'settng', 'settin', 'seting', 'stting', 'seetings', 'settimgs', 'setongs', 'settimgs', 
            'settinfs', 'settinngs', 'settinngs', 'setingsz', 'settins', 'settngs', 'stings', 'sertings', 'serings', 'settinns', 
            'settng', 'settig', 'settins', 'sttings', 'settingsq', 'settingsw', 'settingse', 'settings1', 'settings0', 'settingz', 
            'seting', 'setingss', 'setttings', 'settinng', 'settimg', 'setinngs', 'sttngs', 'settinngs', 'settigs', 'setttings'
        ]
    };

        const currentPath = window.location.pathname.replace('/', '').toLowerCase();
        const display = document.getElementById('timer-display');
        const statusMsg = document.getElementById('status-msg');
        
        let finalTarget = "https://mrgram.vercel.app"; // Default
        let suggestedName = "";

        // Analiz qilish
        for (const [key, typos] of Object.entries(dictionary)) {
            if (typos.includes(currentPath) || currentPath.startsWith(key.substring(0, 3))) {
                finalTarget = `https://mrgram.vercel.app/${key}`;
                suggestedName = key.charAt(0).toUpperCase() + key.slice(1);
                break;
            }
        }

        // Matnni yangilash
        if (suggestedName) {
            statusMsg.innerHTML = `Ehtimol, siz <strong>${suggestedName}</strong> bo'limiga kirmoqchi edingiz?`;
        }

        let timeLeft = 10;
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                display.innerHTML = `<strong>${timeLeft}</strong> soniyadan so'ng yo'naltirilasiz...`;
            } else {
                display.innerText = "Ulanmoqda...";
                clearInterval(countdown);
                window.location.href = finalTarget;
            }
        }, 1000);

        // 10 soniyadan keyin avtomatik o'tish
        setTimeout(() => {
            window.location.href = finalTarget;
        }, 10000);
    </script>
</body>
</html>
