<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
    <style>
        /* Ichki detallar uchun glitch */
        @keyframes layerGlitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-12px, 2px); }
            94% { transform: translate(12px, -2px); }
            96% { transform: translate(-5px, 5px); }
        }

        /* Soyalar titrashi */
        @keyframes shadowGlitch {
            0%, 90%, 100% { transform: translate(0); opacity: 0.5; }
            91% { transform: translate(10px, -5px); opacity: 0.8; }
            95% { transform: translate(-10px, 5px); opacity: 0.8; }
        }

        /* O'rta qism ko'proq surilishi */
        @keyframes midSliceGlitch {
            0%, 85%, 100% { transform: translate(0); }
            88% { transform: translate(25px, 0); }
            93% { transform: translate(-15px, 0); }
        }

        .glitch-layer { animation: layerGlitch 4s steps(1) infinite; }
        .shadow-1 { animation: shadowGlitch 4s steps(1) infinite; }
        .shadow-2 { animation: shadowGlitch 4s steps(1) infinite reverse; }
        .mid-slice { animation: midSliceGlitch 4s steps(1) infinite; }
    </style>

    <defs>
        <filter id="mrGramNoise">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise" />
            <feComposite operator="in" in="noise" in2="SourceGraphic" result="composite" />
            <feBlend in="SourceGraphic" in2="composite" mode="multiply" opacity="0.3" />
        </filter>

        <clipPath id="s1"><rect x="0" y="0" width="500" height="95" /></clipPath>
        <clipPath id="s2"><rect x="0" y="95" width="500" height="25" /></clipPath>
        <clipPath id="s3"><rect x="0" y="120" width="500" height="130" /></clipPath>
    </defs>

    <g font-family="Arial Black, sans-serif" font-size="180" font-weight="900" text-anchor="middle" dominant-baseline="middle">
        <text x="246" y="125" fill="#00d4ff" class="shadow-1" opacity="0.6">404</text> 
        <text x="254" y="125" fill="#70e1ff" class="shadow-2" opacity="0.4">404</text> 

        <g fill="#001a2e" filter="url(#mrGramNoise)">
            <text x="250" y="125" clip-path="url(#s1)" class="glitch-layer">404</text>
            <text x="270" y="125" clip-path="url(#s2)" class="mid-slice">404</text> 
            <text x="250" y="125" clip-path="url(#s3)" class="glitch-layer">404</text>
        </g>
    </g>

    <line x1="100" y1="92" x2="400" y2="92" stroke="#87ceeb" stroke-width="1.5" opacity="0.3" class="shadow-1" /> 
    <line x1="50" y1="135" x2="450" y2="135" stroke="#00bfff" stroke-width="1" opacity="0.2" class="shadow-2" /> 
</svg>

