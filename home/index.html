<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MRgram · Telegram Clone</title>
    
    <!-- Root papkadagi favicon -->
    <link rel="icon" type="image/svg+xml" href="../mrgram.svg">
    
    <!-- Home papkasidagi CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <button class="icon-btn" id="menuBtn" aria-label="Menyu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <img src="../mrgram.svg" alt="MRgram" class="header-logo">
                <div class="search-wrapper">
                    <input type="search" placeholder="Qidirish" class="search-input" id="searchInput">
                </div>
            </header>

            <!-- Desktop tablar -->
            <nav class="desktop-tabs">
                <button class="desktop-tab active" data-tab="all">Barchasi</button>
                <button class="desktop-tab" data-tab="personal">Shaxsiy</button>
                <button class="desktop-tab" data-tab="groups">Guruhlar</button>
                <button class="desktop-tab" data-tab="channels">Kanallar</button>
            </nav>

            <!-- Mobil tablar -->
            <nav class="mobile-tabs">
                <button class="tab active" data-tab="all">Barchasi</button>
                <button class="tab" data-tab="important">Kerakli</button>
                <button class="tab" data-tab="unread">O'qilmagan</button>
            </nav>

            <section class="chat-list" id="chatList"></section>
        </aside>

        <!-- ========== RESIZER ========== -->
        <div class="resizer" id="resizer"></div>

        <!-- ========== MAIN CHAT ========== -->
        <main class="main-chat" id="mainChat">
            <header class="chat-header">
                <button class="back-btn icon-btn" id="backBtn" aria-label="Orqaga">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="chat-avatar" id="chatAvatar">
                    <img src="../mrgram.svg" alt="MRgram" class="avatar-img">
                </div>
                <div class="chat-info">
                    <h3 id="chatTitle">MRgram</h3>
                    <p id="chatSubtitle">oxirgi ko'rish yaqinda</p>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
                    <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
                </div>
            </header>

            <section class="messages-container" id="messagesContainer">
                <div class="message-placeholder">
                    <span>Suhbatni boshlash uchun chat tanlang</span>
                </div>
            </section>

            <div class="chat-input-area">
                <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                <input type="text" placeholder="Xabar yozing..." class="message-input" id="messageInput">
                <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg></button>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </main>

        <!-- ========== FAB ========== -->
        <button class="fab" id="fabBtn" aria-label="Yangi xabar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 5v14M8 12h14"/></svg>
        </button>
    </div>

    <!-- ========== BURGER MENU (DESKTOP) ========== -->
    <div class="burger-overlay" id="burgerOverlay"></div>
    <aside class="burger-menu" id="burgerMenu">
        <div class="burger-profile">
            <div class="burger-profile-bg"></div>
            <div class="burger-profile-content">
                <div class="burger-avatar">
                    <img src="../mrgram.svg" alt="Avatar">
                </div>
                <div class="burger-info">
                    <h4>Fazlulloh</h4>
                    <p>+998 90 123 45 67</p>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>

        <nav class="burger-nav">
            <a href="../groups/index.html" class="burger-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Yangi guruh</span>
            </a>
            <a href="../contacts/index.html" class="burger-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Kontaktlar</span>
            </a>
            <a href="../call/index.html" class="burger-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                <span>Qo'ng'iroqlar</span>
            </a>
            <a href="../saved/index.html" class="burger-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                <span>Saqlangan xabarlar</span>
            </a>
            <a href="../settings/index.html" class="burger-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Sozlamalar</span>
            </a>
            <a href="../chats/index.html" class="burger-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Chatlar</span>
            </a>
        </nav>

        <div class="burger-footer">
            <div class="burger-version">MRgram v1.0</div>
            <div class="burger-mrai">MRAI AI Integration</div>
        </div>
    </aside>

    <!-- ========== MOBILE MENU ========== -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <aside class="mobile-menu" id="mobileMenu">
        <div class="menu-header">
            <img src="../mrgram.svg" alt="MRgram" class="menu-logo">
            <span>MRgram</span>
        </div>
        <nav class="mobile-nav">
            <a href="../groups/index.html" class="menu-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Yangi guruh</span>
            </a>
            <a href="../contacts/index.html" class="menu-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Kontaktlar</span>
            </a>
            <a href="../call/index.html" class="menu-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                <span>Qo'ng'iroqlar</span>
            </a>
            <a href="../saved/index.html" class="menu-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                <span>Saqlangan xabarlar</span>
            </a>
            <a href="../settings/index.html" class="menu-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Sozlamalar</span>
            </a>
        </nav>
        <div class="menu-footer">
            <a href="#" id="mobileLogoutBtn" class="menu-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Chiqish</span>
            </a>
        </div>
    </aside>

    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
